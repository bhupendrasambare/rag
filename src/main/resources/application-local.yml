server:
    port: 8080
spring:
    servlet:
        multipart:
            enabled: true
            max-file-size: 100MB
            max-request-size: 100MB
    datasource:
        url: jdbc:postgresql://localhost:5432/rag_db
        username: rag_user
        password: password
    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true
    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
        validate-on-migrate: true
    ai:
        ollama:
            base-url: http://localhost:11434
            chat:
                model: mistral:7b
            embedding:
                model: nomic-embed-text
        vectorstore:
            pgvector:
                initialize-schema: false
                dimensions: 768

management:
    endpoints:
        web:
            exposure:
                include: health,info

logging:
    level:
        org.springframework.ai: INFO
        org.flywaydb: DEBUG